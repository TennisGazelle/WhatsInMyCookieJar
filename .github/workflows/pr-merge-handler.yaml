name: Deploy static page after PR merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            ./ dist/

          # Optional but useful if you are using a custom domain.
          echo "whatsinmycookiejar.com" > dist/CNAME

          # Prevent GitHub Pages from trying to process the site with Jekyll.
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
